name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
            echo "preview_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
            echo "Deployed preview: $DEPLOY_URL"
          else
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
            echo "preview_url=https://v-aim.vercel.app" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            🚀 **Preview deployment ready!**

            | Environment | URL |
            |---|---|
            | Preview | ${{ steps.deploy.outputs.preview_url }} |
            | Production | https://v-aim.vercel.app |

            The preview is automatically updated on each push.
          comment_tag: preview_deployment
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
